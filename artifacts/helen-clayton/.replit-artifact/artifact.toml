kind = "web"
previewPath = "/"
title = "Helen Clayton Celebrancy"
version = "1.0.0"
id = "artifacts/helen-clayton"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20187

[services.development]
run = "pnpm --filter @workspace/helen-clayton run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/helen-clayton", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20187"
BASE_PATH = "/"
